<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<title>Elite Names</title>
<script>
'use strict';

// 32 syllables used by Elite when generating system names
// https://www.bbcelite.com/deep_dives/generating_system_names.html
const elite_syllable_list = ["al", "le", "xe", "ge", "za", "ce", "bi", "so", "us", "es"
,"ar", "ma", "in", "di", "re", "a",  "er", "at", "en", "be"
,"ra", "la", "ve", "ti", "ed", "or", "qu", "an", "te", "is"
,"ri", "on"];

function fnv1a_hash(s)
{
  const textEncoder = new TextEncoder();
  const utf8_s = new Uint8Array(s.length * 3);
  const r = textEncoder.encodeInto(s, utf8_s);
  const fnv_prime = 2n ** 88n + 0x13bn;
  let hash = 0x6c62272e07bb014262b821756295c58dn;
  for (let i = 0; i < r.written; i++) {
    hash = ((hash ^ BigInt(utf8_s[i] & 0xff)) * fnv_prime) & 0xffffffffffffffffffffffffffffffffn;
  }
  return hash;
}

function update_elite(from_id, to_id)
{
  const seed = document.getElementById(from_id).value;
  const elite_bits = fnv1a_hash(seed);
  let elite_system_name = '';
  let syllable_ct = 3n;
  if ((elite_bits >> 21n) & 1n) {
    syllable_ct = 4n;
  }
  for (let i = 0n; i < syllable_ct; i++) {
    elite_system_name = elite_system_name + elite_syllable_list[(elite_bits >> (i * 5n)) & 0x1fn];
  }
  elite_system_name = elite_system_name[0].toUpperCase() + elite_system_name.substring(1);
  document.getElementById(to_id).value = elite_system_name + '-' + elite_bits.toString().substr(1, 3);
}

function update_the_list()
{
  navigator.clipboard.writeText(document.getElementById('system_name').value)

  // Check if identifier is already in datalist
  let seed = document.getElementById('seed').value
  let previously_used = document.getElementById('previously_used');
  let already_used = false;
  if (previously_used !== null) {
    for (let i = 0; i < previously_used.options.length; i++) {
      if (previously_used.options[i].value === seed) {
        already_used = true;
        break;
      }
    }
    // Store identifier in datalist if not already there
    if (!already_used) {
      let option = document.createElement('option');
      option.value = seed;
      previously_used.appendChild(option);
    }
  }
}

</script>
</head>
<body>
<form onsubmit="return false">
  <p><img src="short-range_chart.png" width="256" height="248">
  <p><label for="seed">Seed</label> <input list="previously_used" id="seed" oninput="update_elite('seed', 'system_name')">
  <input type="reset" value="Clear">
  <datalist id="previously_used">
    <option>john.doe@example.com</option>
  </datalist> 
  <p><label for="system_name">System name</label> <input type="text" id="system_name"  size="11" readonly>
  <input type="button" value="Copy" onClick="update_the_list()">
</form>
</body>
</html>

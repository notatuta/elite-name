<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="288x288" href="icon-256.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-256.png">
<title>Elite Names</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 1rem;
    background: #000000;
    color: #ffffff;
  }
  .container {
    max-width: 400px;
    margin: 0 auto;
  }
  img {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 0 auto 1rem auto;
  }
  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    align-items: center;
  }
  .row label {
    flex: 0 0 auto;
    font-weight: 600;
    min-width: 6rem;
  }
  .row input[type="text"],
  .row select {
    flex: 1 1 auto;
    min-width: 0;
    font-size: 16px;
    padding: 0.4rem 0.5rem;
    border: 1px solid #ffffff;
    border-radius: 4px;
    background: #000000;
    color: #ffffff;
  }
  .row select option {
    background: #000000;
    color: #ffffff;
  }
  .btn {
    font-size: 16px;
    padding: 0.4rem 0.75rem;
    border: 1px solid #ffffff;
    border-radius: 4px;
    background: #000000;
    color: #ffffff;
    cursor: pointer;
  }
  .btn:active {
    background: #333333;
  }
  .btn-group {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .full-width {
    width: 100%;
  }
  @media (max-width: 360px) {
    .row label {
      flex: 1 1 100%;
    }
    .row input[type="text"],
    .row select {
      flex: 1 1 100%;
    }
  }
</style>
<script>
'use strict';

// 32 syllables used by Elite when generating system names
// https://www.bbcelite.com/deep_dives/generating_system_names.html
const elite_syllable_list = [
  "al", "le", "xe", "ge", "za", "ce", "bi", "so", "us", "es",
  "ar", "ma", "in", "di", "re", "a",  "er", "at", "en", "be",
  "ra", "la", "ve", "ti", "ed", "or", "qu", "an", "te", "is",
  "ri", "on"
];
async function pbkdf2_hash(seed) {
  const encoder = new TextEncoder();
  const seedBytes = encoder.encode(seed);
  const baseKey = await crypto.subtle.importKey(
    "raw",
    seedBytes,
    { name: "PBKDF2" },
    false,
    ["deriveBits"]
  );
  const salt = encoder.encode("elite-seed-salt");
  const derivedBits = await crypto.subtle.deriveBits(
    {
      name: "PBKDF2",
      salt: salt,
      iterations: 1000,
      hash: "SHA-256"
    },
    baseKey,
    256
  );
  const view = new DataView(derivedBits);
  let hash = 0n;
  for (let i = 0; i < 16; i++) {
    hash = (hash << 8n) | BigInt(view.getUint8(i));
  }
  return hash;
}

async function generate_elite(seed) {
  const elite_bits = await pbkdf2_hash(seed);
  let elite_system_name = '';
  let syllable_ct = 3n;
  if ((elite_bits >> 21n) & 1n) {
    syllable_ct = 4n;
  }
  for (let i = 0n; i < syllable_ct; i++) {
    elite_system_name = elite_system_name + elite_syllable_list[(elite_bits >> (i * 5n)) & 0x1fn];
  }
  elite_system_name = elite_system_name[0].toUpperCase() + elite_system_name.substring(1);
  return elite_system_name + '-' + elite_bits.toString().substr(1, 3);
}

async function update_elite() {
  const seed = document.getElementById('seed').value;
  document.getElementById('system_name').value = await generate_elite(seed);
}

function load_history() {
  try {
    const raw = localStorage.getItem('elite_seed_history');
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function save_history(seeds) {
  try {
    localStorage.setItem('elite_seed_history', JSON.stringify(seeds));
  } catch (e) {
    // Storage may be unavailable or full
  }
}

function populate_history_dropdown() {
  const select = document.getElementById('history');
  const seeds = load_history();
  select.innerHTML = '';
  const placeholder = document.createElement('option');
  placeholder.text = 'Previously used seeds…';
  placeholder.value = '';
  select.appendChild(placeholder);
  seeds.forEach(function(seed) {
    const option = document.createElement('option');
    option.value = seed;
    option.text = seed;
    select.appendChild(option);
  });
}

function add_to_history(seed) {
  if (!seed) return;
  let seeds = load_history();
  // Remove if already present so it moves to the top
  seeds = seeds.filter(function(s) { return s !== seed; });
  seeds.unshift(seed);
  // Keep only the most recent 50
  if (seeds.length > 50) {
    seeds = seeds.slice(0, 50);
  }
  save_history(seeds);
  populate_history_dropdown();
}

async function on_history_select() {
  const select = document.getElementById('history');
  const seed = select.value;
  if (seed) {
    document.getElementById('seed').value = seed;
    await update_elite();
  }
  // Reset to placeholder
  select.value = '';
}

function copy_system() {
  const name = document.getElementById('system_name').value;
  const seed = document.getElementById('seed').value;
  navigator.clipboard.writeText(name).catch(function() {});
  add_to_history(seed);
}

function copy_seeds_to_clipboard() {
  const seeds = load_history();
  const text = JSON.stringify(seeds, null, 2);
  navigator.clipboard.writeText(text).catch(function() {});
}

function restore_seeds_from_clipboard() {
  navigator.clipboard.readText().then(function(text) {
    let seeds;
    try {
      seeds = JSON.parse(text);
    } catch (e) {
      // If not valid JSON, try treating as newline-separated
      seeds = text.split(/\r?\n/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
    }
    if (!Array.isArray(seeds)) {
      seeds = [seeds];
    }
    // Ensure all entries are strings
    seeds = seeds.map(function(s) { return String(s); });
    // Filter out empty strings
    seeds = seeds.filter(function(s) { return s.length > 0; });
    // Limit to 50
    if (seeds.length > 50) {
      seeds = seeds.slice(0, 50);
    }
    save_history(seeds);
    populate_history_dropdown();
  }).catch(function() {});
}

function clear_all() {
  document.getElementById('seed').value = '';
  document.getElementById('system_name').value = '';
  document.getElementById('history').value = '';
}

window.addEventListener('DOMContentLoaded', async function() {
  populate_history_dropdown();
  await update_elite();
});
</script>
</head>
<body>
<div class="container">
  <form onsubmit="return false">
    <img src="short-range_chart.png" width="256" height="248" alt="Short range chart">

    <div class="row">
      <label for="seed">Seed</label>
      <input type="text" id="seed" oninput="update_elite()">
    </div>

    <div class="row">
      <label for="history">History</label>
      <select id="history" onchange="on_history_select()">
        <option value="">Previously used seeds…</option>
      </select>
    </div>

    <div class="row btn-group">
      <button type="button" class="btn" onclick="copy_seeds_to_clipboard()">Copy seeds to clipboard</button>
      <button type="button" class="btn" onclick="restore_seeds_from_clipboard()">Restore seeds from clipboard</button>
    </div>

    <div class="row">
      <label for="system_name">System</label>
      <input type="text" id="system_name" readonly>
    </div>

    <div class="row btn-group">
      <button type="button" class="btn" onclick="clear_all()">Clear</button>
      <button type="button" class="btn" onclick="copy_system()">Copy System</button>
    </div>
  </form>
</div>
</body>
</html>
